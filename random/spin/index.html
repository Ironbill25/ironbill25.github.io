<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>spin</title>
    <style>
      @keyframes spin1 {
        0% {
          transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateX(-50%)
            translateY(-50%);
        }

        50% {
          transform: rotateX(180deg) rotateY(-180deg) rotateZ(180deg)
            translateX(-50%) translateY(-50%);
        }

        100% {
          transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg)
            translateX(-50%) translateY(-50%);
        }
      }

      @keyframes spin2 {
        0% {
          transform: rotateX(0deg) translateX(-50%) translateY(-50%);
        }

        50% {
          transform: rotateX(180deg) translateX(-50%) translateY(-50%);
        }

        100% {
          transform: rotateX(360deg) translateX(-50%) translateY(-50%);
        }
      }

      @keyframes spin3 {
        0% {
          transform: rotateY(0deg) rotateZ(0deg) translateX(-50%)
            translateY(-50%);
        }

        50% {
          transform: rotateY(-180deg) rotateZ(90deg) translateX(-50%)
            translateY(-50%);
        }

        100% {
          transform: rotateY(360deg) rotateZ(360deg) translateX(-50%)
            translateY(-50%);
        }
      }

      body {
        margin: 0;
        overflow: hidden;
      }

      p {
        position: absolute;
      }

      p.one {
        animation: spin1 2s infinite;
        left: 50%;
        top: 50%;
      }

      p.two {
        animation: spin1 2s infinite;
        left: 50%;
        top: 75%;
      }

      p.three {
        animation: spin1 2s infinite;
        left: 75%;
        top: 25%;
      }

      p.four {
        animation: spin2 2s infinite;
        left: 50%;
        top: 10%;
      }

      p.five {
        animation: spin3 3s ease-in infinite;
        left: 50%;
        top: 90%;
      }
    </style>
  </head>
  <body>
    <p class="one">i like to spin it, spin it</p>
    <p class="two">me too!!</p>
    <p class="three">i'm getting motion sickness!</p>
    <p class="four">im calm</p>
    <p class="five">wheee</p>
    <script>
      function mkrand() {
        let el = document.createElement("p");
        el.textContent = "o";
        el.class = "random";
        el.style.left = Math.random() * 100 + "%";
        el.style.top = Math.random() * 100 + "%";
        el.style.animation =
          "spin" +
          (Math.floor(Math.random() * 3) + 1) +
          " " + (Math.random() * 5) + "s infinite";
        el.style.fontSize = Math.floor(Math.random() * 14) + 12 + "px";
        el.style.color = "#" + Math.floor(Math.random() * 16777215).toString(16);
        document.body.appendChild(el);
      }
      for (let i = 0; i < 100; i++) {
        mkrand();
      }
    </script>
  </body>
</html>
